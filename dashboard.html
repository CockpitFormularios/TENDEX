    // ==================== INICIALIZAR INDEXEDDB ====================
    function initOfflineDB() {
      return new Promise((resolve, reject) => {
        if (dbInstance && dbInstance.version >= 32) {
          resolve(dbInstance);
          return;
        }
        const request = indexedDB.open(DB_NAME_OFFLINE, 32);
        request.onerror = (event) => {
          console.error('IndexedDB erro:', event);
          reject(request.error);
        };
        request.onsuccess = (event) => {
          dbInstance = request.result;
          console.log('IndexedDB aberto com sucesso - versão 32');
          verificarPersistenciaDados();
          resolve(dbInstance);
        };
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          console.log('Criando stores versão 32...');
          
          const storesToRemove = ['items_cache', 'files_cache', 'pending_items', 'pending_inspections', 'modelo_pdf', 'sync_log', 'signature_cache'];
          for (const store of storesToRemove) {
            if (db.objectStoreNames.contains(store)) {
              db.deleteObjectStore(store);
            }
          }
          
          db.createObjectStore(STORE_ITEMS, { keyPath: 'id' });
          db.createObjectStore(STORE_FILES, { keyPath: 'id', autoIncrement: true });
          db.createObjectStore(STORE_PENDING_ITEMS, { keyPath: 'id' });
          db.createObjectStore(STORE_PENDING_INSPECTIONS, { keyPath: 'id' });
          db.createObjectStore(STORE_MODELO_PDF, { keyPath: 'id' });
          db.createObjectStore(STORE_SYNC_LOG, { keyPath: 'id', autoIncrement: true });
          db.createObjectStore(STORE_SIGNATURE, { keyPath: 'id' });
        };
      });
    }

    // ==================== CARREGAR ITEMS LOCAL ====================
    async function carregarItemsLocal() {
      try {
        const db = await initOfflineDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_ITEMS, 'readonly');
          const store = tx.objectStore(STORE_ITEMS);
          const request = store.getAll();
          request.onsuccess = () => {
            const items = request.result || [];
            console.log(`📦 carregarItemsLocal: ${items.length} itens encontrados`);
            resolve(items);
          };
          request.onerror = () => reject(request.error);
        });
      } catch (e) { 
        console.warn('Erro ao carregar items local:', e); 
        return []; 
      }
    }

    async function salvarItemsLocal(items) {
      try {
        const db = await initOfflineDB();
        const tx = db.transaction(STORE_ITEMS, 'readwrite');
        const store = tx.objectStore(STORE_ITEMS);
        for (const item of items) {
          store.put(item);
        }
        return new Promise((resolve, reject) => {
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      } catch (e) { console.warn('Erro ao salvar items local:', e); }
    }

    // ==================== CACHEAR ASSINATURA ====================
    async function cachearAssinatura() {
      if (!currentUser || !currentUser.username) return null;
      
      const nomeUsuario = currentUser.username.toLowerCase();
      const assinaturaUrl = `https://jklcvyuxwxgsfczrfaco.supabase.co/storage/v1/object/public/assinaturas/${nomeUsuario}.png`;
      const cacheKey = `assinatura_${nomeUsuario}`;
      
      try {
        const db = await initOfflineDB();
        const tx = db.transaction(STORE_SIGNATURE, 'readonly');
        const store = tx.objectStore(STORE_SIGNATURE);
        const cached = await new Promise((resolve) => {
          const request = store.get(cacheKey);
          request.onsuccess = () => resolve(request.result);
        });
        
        if (cached && cached.data) {
          console.log('✅ Assinatura carregada do cache');
          cachedSignature = cached.data;
          updateSignatureStatus(true);
          return cached.data;
        }
        
        if (navigator.onLine) {
          const response = await fetch(assinaturaUrl);
          if (response.ok) {
            const imageBytes = await response.arrayBuffer();
            const tx2 = db.transaction(STORE_SIGNATURE, 'readwrite');
            const store2 = tx2.objectStore(STORE_SIGNATURE);
            store2.put({ id: cacheKey, data: imageBytes });
            cachedSignature = imageBytes;
            console.log('✅ Assinatura cacheada com sucesso');
            updateSignatureStatus(true);
            return imageBytes;
          } else {
            console.warn('⚠️ Assinatura não encontrada no servidor');
            updateSignatureStatus(false);
          }
        }
      } catch (error) {
        console.warn('Erro ao cachear assinatura:', error);
        updateSignatureStatus(false);
      }
      
      return null;
    }

    async function updateSignatureStatus(isCached) {
      const statusDiv = document.getElementById('userModalSignatureStatus');
      if (statusDiv) {

          statusDiv.innerHTML = '✅ Assinatura cacheada';

        } else {
          statusDiv.innerHTML = '⚠️ Assinatura não disponível';

        }
      }
    }

    // ==================== PREPARAR CACHE OFFLINE ====================
    async function prepararCacheOffline() {
      if (!navigator.onLine) {
        console.log('📡 Offline - não é possível preparar cache agora');
        return false;
      }
      
      console.log('📥 Preparando cache offline (atualizando PDF)...');
      try {
        const response = await fetch(MODELO_PDF_URL);
        if (!response.ok) throw new Error('Falha ao baixar modelo');
        const buffer = await response.arrayBuffer();
        
        const db = await initOfflineDB();
        const tx = db.transaction(STORE_MODELO_PDF, 'readwrite');
        const store = tx.objectStore(STORE_MODELO_PDF);
        
        await new Promise((resolve, reject) => {
          const clearReq = store.clear();
          clearReq.onsuccess = () => {
            const putReq = store.put({ id: 'modelo', data: buffer });
            putReq.onsuccess = () => resolve();
            putReq.onerror = () => reject(putReq.error);
          };
          clearReq.onerror = () => reject(clearReq.error);
        });
        
        await new Promise((resolve) => { tx.oncomplete = () => resolve(); });
        
        cachedModeloPDF = buffer;
        await updateUserModalCacheStatus();
        
        console.log('✅ Cache offline atualizado com sucesso');
        return true;
      } catch (error) {
        console.error('❌ Erro ao preparar cache offline:', error);
        return false;
      }
    }

    // ==================== GET ALL ITEMS WITH FILES ====================
    async function getAllItemsWithFiles() {
      let items = [];
      let files = [];
      
      const itemsLocal = await carregarItemsLocal();
      const filesLocal = await carregarFilesLocal();
      const pendentesItems = await getPendingItems();
      
      console.log(`📊 ESTADO COMPLETO DO CACHE:`);
      console.log(`   - Itens no cache local: ${itemsLocal.length}`);
      console.log(`   - Itens pendentes: ${pendentesItems.length}`);
      
      const pendentesComoItens = pendentesItems.map(p => ({
        id: p.id,
        name: p.name,
        sub_localizacao: p.sub_localizacao || '',
        tamanho: p.tamanho || '',
        code: p.code,
        status: 'active',
        pending: true,
        files: [],
        createdAt: p.timestamp || new Date().toISOString()
      }));
      
      const todosItens = [...itemsLocal, ...pendentesComoItens];
      const uniqueItems = [];
      const seenIds = new Set();
      for (const item of todosItens) {
        if (!seenIds.has(item.id)) {
          seenIds.add(item.id);
          uniqueItems.push(item);
        }
      }
      
      const isOnline = navigator.onLine && await testarConexao();
      
      if (isOnline) {
        try {
          console.log('🌐 Buscando dados do servidor...');
          const { data: itemsData, error: itemsError } = await supabase.from('items').select('*').order('id', { ascending: true });
          if (!itemsError && itemsData) {
            const serverItemCodes = new Set(itemsData.map(i => i.code));
            const pendentesNaoNoServidor = pendentesItems.filter(p => !serverItemCodes.has(p.code));
            const pendentesComoItensFiltrados = pendentesNaoNoServidor.map(p => ({
              id: p.id,
              name: p.name,
              sub_localizacao: p.sub_localizacao || '',
              tamanho: p.tamanho || '',
              code: p.code,
              status: 'active',
              pending: true,
              files: []
            }));
            
            items = [...itemsData, ...pendentesComoItensFiltrados];
            await salvarItemsLocal(items);
            console.log(`✅ ${items.length} itens no total (${itemsData.length} servidor + ${pendentesComoItensFiltrados.length} pendentes)`);
          } else {
            items = uniqueItems;
          }
          
          const { data: filesData, error: filesError } = await supabase.from('files').select('*');
          if (!filesError && filesData) {
            files = filesData;
            await salvarFilesLocal(files);
          } else {
            files = filesLocal;
          }
        } catch (error) {
          console.warn('Erro ao buscar online:', error);
          items = uniqueItems;
          files = filesLocal;
        }
      } else {
        items = uniqueItems;
        files = filesLocal;
        console.log(`📡 Modo OFFLINE - ${items.length} itens (${itemsLocal.length} cache + ${pendentesItems.length} pendentes)`);
      }
      
      if (!items || items.length === 0) {
        console.warn('⚠️ Nenhum item encontrado');
        return [];
      }
      
      const filesByItem = {};
      if (files && files.length > 0) {
        files.forEach(file => { 
          if (file && file.item_id) {
            if (!filesByItem[file.item_id]) filesByItem[file.item_id] = []; 
            filesByItem[file.item_id].push(file); 
          }
        });
      }
      
      const result = items.map(item => ({ 
        id: item.id, 
        name: item.name || 'Sem nome', 
        sub_localizacao: item.sub_localizacao || '', 
        tamanho: item.tamanho || '', 
        code: item.code || 'SEM-CODIGO', 
        status: item.status || 'active',
        pending: item.pending || false,
        files: filesByItem[item.id] || [] 
      }));
      
      console.log(`🎯 RESULTADO FINAL: ${result.length} itens para exibição (${result.filter(i => i.pending).length} pendentes)`);
      
      currentItems = result;
      return result;
    }

    // ==================== SAVE ITEM COMPLETE ====================
    async function saveItemComplete(itemId, name, sub_localizacao, tamanho, code, filesToProcess) {
      const isOnline = navigator.onLine && await testarConexao();
      const offlineId = `offline_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
      
      if (!isOnline) {
        console.log('💾 Modo OFFLINE - Salvando item permanentemente...');
        
        const itemsLocal = await carregarItemsLocal();
        const existeLocal = itemsLocal.some(i => i.code === code);
        
        if (existeLocal) {
          alert('❌ Este código já existe localmente. Use outro código.');
          throw new Error('Código duplicado localmente');
        }
        
        const pendingData = {
          id: offlineId,
          name: name,
          sub_localizacao: sub_localizacao || '',
          tamanho: tamanho || '',
          code: code,
          timestamp: new Date().toISOString()
        };
        await salvarItemPending(pendingData);
        console.log(`✅ Item pendente salvo: ${offlineId}`);
        
        const newItem = {
          id: offlineId,
          name: name,
          sub_localizacao: sub_localizacao || '',
          tamanho: tamanho || '',
          code: code,
          status: 'active',
          files: [],
          pending: true
        };
        
        itemsLocal.push(newItem);
        await salvarItemsLocal(itemsLocal);
        console.log(`✅ Item adicionado ao cache local: ${itemsLocal.length} total`);
        
        await refreshData();
        await updatePendingBadge();
        
        alert('⚠️ Você está offline. O item foi salvo localmente e será sincronizado quando a internet voltar.');
        return offlineId;
      }
      
      const { data: existing } = await supabase.from('items').select('id').eq('code', code).maybeSingle();
      if (existing && existing.id !== itemId) {
        alert(`❌ O código "${code}" já está em uso.`);
        throw new Error(`Código "${code}" já existe`);
      }
      
      const uploadedUrls = [];
      for (const item of filesToProcess) {
        if (item.file) {
          const fileExt = item.file.name.split('.').pop();
          const tempId = itemId || 'temp';
          const filePath = `itens/${tempId}/${item.category}_${Date.now()}.${fileExt}`;
          await supabase.storage.from(BUCKET).upload(filePath, item.file);
          const { data: publicUrlData } = supabase.storage.from(BUCKET).getPublicUrl(filePath);
          uploadedUrls.push({
            category: item.category,
            url: publicUrlData.publicUrl,
            fileName: item.file.name
          });
        } else {
          uploadedUrls.push({ category: item.category, url: null });
        }
      }

      let itemIdFinal = itemId;
      const itemData = { name, sub_localizacao: sub_localizacao || '', tamanho: tamanho || '', code, status: 'active' };
      
      if (itemId && !itemId.toString().startsWith('offline_')) {
        await supabase.from('items').update(itemData).eq('id', itemId);
      } else {
        const { data: newItem, error: insertError } = await supabase.from('items').insert(itemData).select().single();
        if (insertError) throw insertError;
        itemIdFinal = newItem.id;
        
        const pendentesItems = await getPendingItems();
        const pendenteExistente = pendentesItems.find(p => p.code === code);
        if (pendenteExistente) {
          await removerItemPending(pendenteExistente.id);
          console.log(`✅ Item pendente removido: ${pendenteExistente.id}`);
        }
      }

      for (const fileInfo of uploadedUrls) {
        if (fileInfo.url) {
          const { data: existingFile } = await supabase.from('files').select('id, file_url').eq('item_id', itemIdFinal).eq('category', fileInfo.category).maybeSingle();
          if (existingFile) {
            await deleteStorageFile(existingFile.file_url);
            await supabase.from('files').delete().eq('id', existingFile.id);
          }
          await supabase.from('files').insert({
            item_id: itemIdFinal,
            category: fileInfo.category,
            file_name: fileInfo.fileName,
            file_url: fileInfo.url
          });
        }
      }
      
      const allItems = await supabase.from('items').select('*');
      const allFiles = await supabase.from('files').select('*');
      await salvarItemsLocal(allItems.data || []);
      await salvarFilesLocal(allFiles.data || []);
      await refreshData();
      
      return itemIdFinal;
    }

    // ==================== TESTE DE CONEXÃO ====================
    async function testarConexao() {
      if (!navigator.onLine) return false;
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);
        await fetch('https://www.google.com', { method: 'HEAD', signal: controller.signal, mode: 'no-cors' });
        clearTimeout(timeoutId);
        return true;
      } catch (error) { return navigator.onLine; }
    }

    // ==================== FUNÇÕES AUXILIARES ====================
    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    function base64ToBlob(base64, mimeType) {
      const byteCharacters = atob(base64);
      const byteNumbers = new Array(byteCharacters.length);
      for (let i = 0; i < byteCharacters.length; i++) byteNumbers[i] = byteCharacters.charCodeAt(i);
      const byteArray = new Uint8Array(byteNumbers);
      return new Blob([byteArray], { type: mimeType });
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
    function formatarData(dataString) { if (!dataString) return ''; const partes = dataString.split('-'); if (partes.length === 3) return `${partes[2]}/${partes[1]}/${partes[0]}`; return dataString; }

    // ==================== SINCRONIZAR COM PROGRESSO ====================
    async function sincronizarComProgresso() {
      const syncModalProgress = document.getElementById('syncModalProgress');
      const pendentesItems = await getPendingItems();
      const pendentesInsp = await getPendingInspections();
      const total = pendentesItems.length + pendentesInsp.length;
      let concluidos = 0;
      let erros = 0;
      const mapaIds = {};
      
      if (total === 0) {
        console.log('✅ Nenhum item pendente para sincronizar');
        return;
      }
      
      console.log(`🔄 Iniciando sincronização de ${total} itens...`);
      
      function atualizarProgresso(sucesso) {
        concluidos++;
        const percent = (concluidos / total) * 100;
        if (syncModalProgress) syncModalProgress.style.width = `${percent}%`;
      }
      
      // FASE 1: Sincronizar itens pendentes
      console.log('📦 FASE 1 - Sincronizando itens pendentes...');
      
      for (const item of pendentesItems) {
        try {
          const element = document.getElementById(`sync-item-${item.id}`);
          if (element) {
            element.querySelector('span:last-child').innerHTML = '<span style="color: #f59e0b;">🔄 Sincronizando...</span>';
          }
          
          const { data: existing, error: checkError } = await supabase
            .from('items')
            .select('id, code')
            .eq('code', item.code)
            .maybeSingle();
          
          if (checkError) throw checkError;
          
          if (existing) {
            mapaIds[item.code] = existing.id;
            if (element) {
              element.querySelector('span:last-child').innerHTML = '<span style="color: #10b981;">✅ Já existe no servidor</span>';
              element.style.background = '#d1fae5';
            }
            await removerItemPending(item.id);
            atualizarProgresso(true);
            console.log(`✅ Item ${item.code} já existia, removido da fila`);
            continue;
          }
          
          const { data: newItem, error: insertError } = await supabase.from('items').insert({
            name: item.name,
            sub_localizacao: item.sub_localizacao || '',
            tamanho: item.tamanho || '',
            code: item.code,
            status: 'active'
          }).select().single();
          
          if (insertError) throw insertError;
          
          mapaIds[item.code] = newItem.id;
          await removerItemPending(item.id);
          
          if (element) {
            element.querySelector('span:last-child').innerHTML = '<span style="color: #10b981;">✅ Sincronizado!</span>';
            element.style.background = '#d1fae5';
          }
          atualizarProgresso(true);
          console.log(`✅ Item ${item.name} sincronizado com ID: ${newItem.id}`);
          
        } catch (error) {
          console.error(`❌ Erro ao sincronizar item:`, error);
          erros++;
          const element = document.getElementById(`sync-item-${item.id}`);
          if (element) {
            element.querySelector('span:last-child').innerHTML = `<span style="color: #ef4444;">❌ ${error.message?.substring(0, 50) || 'Erro'}</span>`;
            element.style.background = '#fee2e2';
          }
          atualizarProgresso(false);
        }
      }
      
      // FASE 2: Sincronizar inspeções pendentes
      console.log('📋 FASE 2 - Sincronizando inspeções pendentes...');
      
      for (const insp of pendentesInsp) {
        try {
          const element = document.getElementById(`sync-insp-${insp.id}`);
          if (element) {
            element.querySelector('span:last-child').innerHTML = '<span style="color: #f59e0b;">🔄 Sincronizando...</span>';
          }
          
          let itemIdReal = mapaIds[insp.itemInfo?.code];
          
          if (!itemIdReal) {
            const { data: itemData, error: itemError } = await supabase
              .from('items')
              .select('id')
              .eq('code', insp.itemInfo?.code)
              .maybeSingle();
            
            if (itemError) throw itemError;
            
            if (!itemData) {
              throw new Error(`Item pai não encontrado: ${insp.itemInfo?.code}`);
            }
            itemIdReal = itemData.id;
          }
          
          const pdfBlob = base64ToBlob(insp.pdfBase64, 'application/pdf');
          const pdfFile = new File([pdfBlob], `checklist_${insp.monthName}_${Date.now()}.pdf`, { type: 'application/pdf' });
          
          let fotoFile = null;
          if (insp.fotoBase64) {
            const fotoBlob = base64ToBlob(insp.fotoBase64, 'image/jpeg');
            fotoFile = new File([fotoBlob], `foto_${Date.now()}.jpg`, { type: 'image/jpeg' });
          }
          
          await addFileToItem(itemIdReal, insp.category, pdfFile, insp.formData.data_inspecao);
          await removerInspecaoPending(insp.id);
          
          if (element) {
            element.querySelector('span:last-child').innerHTML = '<span style="color: #10b981;">✅ Sincronizado!</span>';
            element.style.background = '#d1fae5';
          }
          atualizarProgresso(true);
          console.log(`✅ Inspeção para ${insp.itemInfo?.code} sincronizada`);
          
        } catch (error) {
          console.error(`❌ Erro ao sincronizar inspeção:`, error);
          erros++;
          const element = document.getElementById(`sync-insp-${insp.id}`);
          if (element) {
            element.querySelector('span:last-child').innerHTML = `<span style="color: #ef4444;">❌ ${error.message?.substring(0, 50) || 'Erro'}</span>`;
            element.style.background = '#fee2e2';
          }
          atualizarProgresso(false);
        }
      }
      
      await limparDadosSincronizadosOnline();
      
      const sucessos = concluidos - erros;
      console.log(`✅ Sincronização concluída: ${sucessos}/${total} itens processados`);
      
      return { concluidos, erros };
    }

    // ==================== PREPARAR MODO OFFLINE MANUAL ====================
    async function forcarCacheModeloPDF() {
      const loader = document.getElementById('fullscreenLoader');
      loader.classList.add('active');
      
      try {
        console.log('📥 Preparando modo offline manualmente...');
        
        const response = await fetch(MODELO_PDF_URL);
        if (!response.ok) throw new Error('Falha ao baixar modelo');
        const buffer = await response.arrayBuffer();
        
        const db = await initOfflineDB();
        const tx = db.transaction(STORE_MODELO_PDF, 'readwrite');
        const store = tx.objectStore(STORE_MODELO_PDF);
        
        await new Promise((resolve, reject) => {
          const clearReq = store.clear();
          clearReq.onsuccess = () => {
            const putReq = store.put({ id: 'modelo', data: buffer });
            putReq.onsuccess = () => resolve();
            putReq.onerror = () => reject(putReq.error);
          };
          clearReq.onerror = () => reject(clearReq.error);
        });
        
        await new Promise((resolve) => { tx.oncomplete = () => resolve(); });
        
        cachedModeloPDF = buffer;
        await updateUserModalCacheStatus();
        
        console.log('✅ Modo offline preparado com sucesso!');
        showSyncStatus('✅ Modo offline pronto!');
        alert('✅ Modo offline preparado com sucesso!\n\nAgora você pode usar o sistema sem internet.');
        
      } catch (error) {
        console.error('❌ Erro ao preparar modo offline:', error);
        alert('Erro ao preparar modo offline: ' + error.message);
      } finally {
        loader.classList.remove('active');
      }
    }

    // ==================== FUNÇÕES DE ARQUIVO ====================
    function getStoragePathFromUrl(url) {
      const regex = /\/storage\/v1\/object\/public\/pdfs\/(.+)$/;
      const match = url.match(regex);
      return match ? match[1] : null;
    }

    async function deleteStorageFile(fileUrl) {
      const path = getStoragePathFromUrl(fileUrl);
      if (!path) return false;
      const { error } = await supabase.storage.from(BUCKET).remove([path]);
      if (error) console.error("Erro ao deletar arquivo do storage:", error);
      return !error;
    }

    async function addFileToItem(itemId, category, file, inspecaoData = null) {
      const { data: existing, error: findError } = await supabase.from('files').select('id, file_url').eq('item_id', itemId).eq('category', category).maybeSingle();
      if (findError) throw findError;
      if (existing && existing.file_url) {
        await deleteStorageFile(existing.file_url);
        await supabase.from('files').delete().eq('id', existing.id);
      }
      const fileExt = file.name.split('.').pop();
      const filePath = `itens/${itemId}/${category}_${Date.now()}.${fileExt}`;
      const { error: uploadError } = await supabase.storage.from(BUCKET).upload(filePath, file);
      if (uploadError) throw uploadError;
      const { data: publicUrlData } = supabase.storage.from(BUCKET).getPublicUrl(filePath);
      const fileUrl = publicUrlData.publicUrl;
      const insertData = { item_id: itemId, category, file_name: file.name, file_url: fileUrl };
      if (inspecaoData) insertData.inspecao_data = inspecaoData;
      const { error: insertError } = await supabase.from('files').insert(insertData);
      if (insertError) throw insertError;
      
      const allFiles = await carregarFilesLocal();
      allFiles.push(insertData);
      await salvarFilesLocal(allFiles);
    }

    async function deleteFileById(fileId) {
      const { data: file, error: findError } = await supabase.from('files').select('file_url').eq('id', fileId).single();
      if (findError) throw findError;
      if (file && file.file_url) await deleteStorageFile(file.file_url);
      await supabase.from('files').delete().eq('id', fileId);
      
      const allFiles = await carregarFilesLocal();
      const filtered = allFiles.filter(f => f.id !== fileId);
      await salvarFilesLocal(filtered);
    }

    async function deleteItemAndFiles(itemId) {
      const { data: files, error: findError } = await supabase.from('files').select('file_url').eq('item_id', itemId);
      if (findError) throw findError;
      for (const file of files) if (file.file_url) await deleteStorageFile(file.file_url);
      await supabase.from('items').delete().eq('id', itemId);
      
      const allItems = await carregarItemsLocal();
      const filteredItems = allItems.filter(i => i.id !== itemId);
      await salvarItemsLocal(filteredItems);
      
      const allFiles = await carregarFilesLocal();
      const filteredFiles = allFiles.filter(f => f.item_id !== itemId);
      await salvarFilesLocal(filteredFiles);
    }

    // ==================== FUNÇÃO DE ASSINATURA CORRIGIDA ====================
    async function adicionarInfoItemEAssinatura(pdfDoc, itemCode, itemTamanho) {
      try {
        const pages = pdfDoc.getPages();
        if (pages.length === 0) return pdfDoc;
        const pagina = pages[0];
        const { width, height } = pagina.getSize();
        const { StandardFonts, rgb } = window.PDFLib;
        const font = await pdfDoc.embedFont(StandardFonts.Helvetica);
        const boldFont = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
        
        const posX = width - 210;
        let posY = 130;
        
        // Adicionar ID e Tamanho
        pagina.drawText(`ID / TAG: ${itemCode}`, { x: posX, y: posY, size: 10, font: boldFont, color: rgb(0,0,0) });
        posY -= 18;
        pagina.drawText(`TAMANHO: ${itemTamanho || 'Não informado'}`, { x: posX, y: posY, size: 10, font: boldFont, color: rgb(0,0,0) });
        posY -= 25;
        
        // Linha para assinatura
        pagina.drawLine({ 
          start: { x: posX - 10, y: posY + 8 }, 
          end: { x: width - 30, y: posY + 8 }, 
          thickness: 1, 
          color: rgb(0.5, 0.5, 0.5) 
        });
        pagina.drawText("Assinatura do Responsável", { 
          x: posX - 10, 
          y: posY - 5, 
          size: 8, 
          font: font, 
          color: rgb(0.5, 0.5, 0.5) 
        });
        
        // Adicionar a imagem da assinatura do usuário
        if (cachedSignature) {
          try {
            let imagem;
            try {
              imagem = await pdfDoc.embedPng(cachedSignature);
              console.log('✅ Assinatura carregada como PNG');
            } catch (e) {
              try {
                imagem = await pdfDoc.embedJpg(cachedSignature);
                console.log('✅ Assinatura carregada como JPG');
              } catch (e2) {
                console.warn('❌ Falha ao carregar imagem da assinatura:', e2);
              }
            }
            
            if (imagem) {
              const areaMaxWidth = 180;
              const areaMaxHeight = 80;
              const scale = Math.min(areaMaxWidth / imagem.width, areaMaxHeight / imagem.height);
              const finalW = imagem.width * scale;
              const finalH = imagem.height * scale;
              const imgX = width - finalW - 30;
              const imgY = posY - finalH - 10;
              
              pagina.drawImage(imagem, { 
                x: imgX, 
                y: imgY, 
                width: finalW, 
                height: finalH 
              });
              console.log(`✅ Assinatura desenhada no PDF (${finalW}x${finalH})`);
            }
          } catch (error) {
            console.error('❌ Erro ao desenhar assinatura:', error);
            pagina.drawText(`(Erro ao carregar assinatura)`, { 
              x: posX - 10, 
              y: posY - 20, 
              size: 8, 
              font: font, 
              color: rgb(0.8, 0.2, 0.2) 
            });
          }
        } else {
          console.warn('⚠️ Nenhuma assinatura em cache');
          pagina.drawText(`(Assinatura não disponível para ${currentUser?.username || 'usuário'})`, { 
            x: posX - 10, 
            y: posY - 20, 
            size: 8, 
            font: font, 
            color: rgb(0.8, 0.2, 0.2) 
          });
        }
        
        return pdfDoc;
      } catch(err) { 
        console.error('❌ Erro em adicionarInfoItemEAssinatura:', err); 
        return pdfDoc; 
      }
    }

    // ==================== GERAR PDF BLOB (CORRIGIDO) ====================
    async function gerarPDFBlob(formData, itemInfo, fotoFile) {
      // Verificar se PDF-lib está disponível
      if (!window.PDFLib || !window.PDFLib.PDFDocument) {
        console.log('PDF-lib não disponível, tentando carregar...');
        await carregarPDFLib();
      }
      
      if (!window.PDFLib || !window.PDFLib.PDFDocument) {
        throw new Error("PDF-lib não pôde ser carregado. Verifique sua conexão com a internet.");
      }
      
      const { PDFDocument } = window.PDFLib;
      console.log('✅ PDFDocument disponível, gerando PDF...');
      
      const modelBytes = await carregarModeloPDF();
      const pdfDoc = await PDFDocument.load(modelBytes);
      const form = pdfDoc.getForm();
      
      const camposCabecalho = [
        { nome: "unidade", valor: formData.unidade || "" },
        { nome: "localidade", valor: formData.localidade || "" },
        { nome: "nome", valor: formData.resp_nome || "" },
        { nome: "matrcula", valor: formData.resp_matricula || "" },
        { nome: "data", valor: formData.data_inspecao || "" },
        { nome: "empresa", valor: formData.empresa || "" }
      ];
      
      for (const campo of camposCabecalho) {
        try { 
          const textField = form.getTextField(campo.nome);
          if (textField) textField.setText(campo.valor || '');
        } catch(e) { console.warn(`Campo ${campo.nome} não encontrado`); }
      }
      
      for (let i = 1; i <= 25; i++) {
        const resposta = formData[`resp_${i-1}`] || "Não respondido";
        try { 
          const textField = form.getTextField(`${i}`);
          if (textField) textField.setText(resposta);
        } catch(e) { console.warn(`Campo ${i} não encontrado`); }
      }
      
      await adicionarInfoItemEAssinatura(pdfDoc, itemInfo.code, itemInfo.tamanho);
      
      if (fotoFile) {
        try {
          const fotoBytes = await fotoFile.arrayBuffer();
          let fotoImage;
          try {
            fotoImage = await pdfDoc.embedPng(fotoBytes);
          } catch {
            fotoImage = await pdfDoc.embedJpg(fotoBytes);
          }
          
          if (fotoImage) {
            const fotoMaxWidth = 300;
            const fotoMaxHeight = 200;
            const scale = Math.min(fotoMaxWidth / fotoImage.width, fotoMaxHeight / fotoImage.height);
            const finalW = fotoImage.width * scale;
            const finalH = fotoImage.height * scale;
            const page = pdfDoc.getPages()[0];
            page.drawImage(fotoImage, { 
              x: 30, 
              y: 30, 
              width: finalW, 
              height: finalH 
            });
          }
        } catch(e) {
          console.warn('Erro ao adicionar foto:', e);
        }
      }
      
      const pdfBytes = await pdfDoc.save();
      console.log('✅ PDF gerado com sucesso, tamanho:', pdfBytes.length);
      return new Blob([pdfBytes], { type: 'application/pdf' });
    }

    // ==================== GENERATE AND ATTACH PDF ====================
    async function generateAndAttachPdf(itemId, category, monthName, formData, itemInfo, fotoFile) {
      const temModelo = await isModeloCacheado();
      if (!temModelo && !navigator.onLine) {
        alert('❌ Modo offline não disponível!\n\nO modelo PDF não está cacheado.\n\nClique no seu usuário > "Preparar Modo Offline" quando tiver internet.');
        return;
      }
      
      const isOnline = navigator.onLine && await testarConexao();
      
      if (!isOnline) {
        try {
          const loader = document.getElementById('fullscreenLoader');
          loader.classList.add('active');
          console.log('💾 Modo offline - iniciando salvamento local...');
          
          if (!temModelo) {
            throw new Error('Modelo PDF não está cacheado para uso offline');
          }
          
          const pdfBlob = await gerarPDFBlob(formData, itemInfo, fotoFile);
          const pdfBase64 = await blobToBase64(pdfBlob);
          let fotoBase64 = null;
          if (fotoFile) fotoBase64 = await blobToBase64(fotoFile);
          
          const pendingId = `insp_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
          
          const pendingData = {
            id: pendingId,
            type: 'inspecao',
            itemId: itemId,
            category: category,
            monthName: monthName,
            formData: formData,
            itemInfo: {
              code: itemInfo.code,
              tamanho: itemInfo.tamanho,
              name: itemInfo.name,
              id: itemId
            },
            pdfBase64: pdfBase64,
            fotoBase64: fotoBase64,
            timestamp: new Date().toISOString()
          };
          await salvarInspecaoPending(pendingData);
          
          loader.classList.remove('active');
          await updatePendingBadge();
          
          console.log(`✅ Inspeção offline salva com ID: ${pendingId}`);
          alert('⚠️ Você está offline. O PDF foi salvo localmente e será enviado automaticamente quando a internet voltar.');
          return;
        } catch (error) {
          const loader = document.getElementById('fullscreenLoader');
          loader.classList.remove('active');
          console.error('❌ Erro ao salvar offline:', error);
          alert('Erro ao salvar inspeção localmente: ' + (error.message || 'Verifique o console'));
          return;
        }
      }

      // MODO ONLINE
      try {
        const pdfBlob = await gerarPDFBlob(formData, itemInfo, fotoFile);
        const file = new File([pdfBlob], `checklist_${monthName}_${Date.now()}.pdf`, { type: 'application/pdf' });
        
        const { data: existingFile } = await supabase.from('files').select('id, file_url').eq('item_id', itemId).eq('category', category).maybeSingle();
        if (existingFile && existingFile.file_url) {
          await deleteStorageFile(existingFile.file_url);
          await supabase.from('files').delete().eq('id', existingFile.id);
        }
        await addFileToItem(itemId, category, file, formData.data_inspecao);
        
        alert(`✅ PDF gerado!\nID: ${itemInfo.code} | Tamanho: ${itemInfo.tamanho || 'N/I'}\nAssinatura: ${currentUser?.username || 'usuário'}`);
        await refreshData();
        await openDetailModal(itemId);
      } catch(err) { 
        console.error('Erro detalhado:', err); 
        alert("Erro ao gerar PDF: " + err.message); 
      }
    }

      const actions = `<button class="upload-pdf-btn" data-itemid="${itemId}" data-category="${category}" data-monthname="${label}" title="Substituir PDF">🔄</button>${file ? `<button class="remove-pdf-btn" data-fileid="${file.id}" title="Remover">✖</button>` : ''}${showFormButton ? `<button class="fill-form-btn" data-itemid="${itemId}" data-category="${category}" data-monthname="${label}" title="Preencher formulário">📝</button>` : ''}`;
      const disabledClass = !isActive ? 'disabled-action' : '';
      if (file) return `<div class="pdf-row"><span class="pdf-label">${escapeHtml(label)}</span><div class="pdf-file-info"><a href="${file.file_url}" target="_blank">📄 ${escapeHtml(file.file_name)}</a></div><div class="pdf-actions ${disabledClass}">${actions}</div></div>`;
      else return `<div class="pdf-row"><span class="pdf-label">${escapeHtml(label)}</span><div class="pdf-file-info">— Nenhum PDF anexado —</div><div class="pdf-actions ${disabledClass}"><button class="upload-pdf-btn" data-itemid="${itemId}" data-category="${category}" data-monthname="${label}" title="Adicionar PDF">➕</button>${showFormButton ? `<button class="fill-form-btn" data-itemid="${itemId}" data-category="${category}" data-monthname="${label}" title="Preencher formulário">📝</button>` : ''}</div></div>`;
    }

    // ==================== FUNÇÕES ADICIONAIS ====================
    async function toggleStatusFromDetail(itemId, newStatus) {
      const item = currentItems.find(i => String(i.id) === String(itemId));
      if (!item) return;
      if (newStatus === 'inactive') {
        if (confirm('Inativar este item? Os dados atuais serão salvos no histórico.')) {
          const loader = document.getElementById('fullscreenLoader');
          loader.classList.add('active');
          try {
            await supabase.from('items').update({ status: 'inactive' }).eq('id', itemId);
            await refreshData();
            const detailModalElem = document.getElementById('detailModal');
            if (detailModalElem && detailModalElem.style.display === 'flex') await openDetailModal(itemId);
          } finally { loader.classList.remove('active'); }
        } else {
          const toggle = document.getElementById('statusToggle');
          if (toggle) toggle.checked = true;
          const statusTextSpan = document.getElementById('statusText');
          if (statusTextSpan) statusTextSpan.innerText = 'Ativo';
        }
      } else if (newStatus === 'active') {
        reactivatingItemId = itemId;
        document.getElementById('editItemName').value = item.name;
        document.getElementById('editSubLocalizacao').value = item.sub_localizacao;
        document.getElementById('editTamanho').value = item.tamanho;
        document.getElementById('reactivateModal').style.display = 'flex';
      }
    }

    async function saveReactivate() {
      const newName = document.getElementById('editItemName').value.trim();
      const newSub = document.getElementById('editSubLocalizacao').value.trim();
      const newTamanho = document.getElementById('editTamanho').value.trim();
      if (!newName) { alert("Localização é obrigatória."); return; }
      const item = currentItems.find(i => String(i.id) === String(reactivatingItemId));
      if (!item) return;
      const loader = document.getElementById('fullscreenLoader');
      loader.classList.add('active');
      try {
        await supabase.from('items').update({ name: newName, sub_localizacao: newSub, tamanho: newTamanho, status: 'active' }).eq('id', reactivatingItemId);
        document.getElementById('reactivateModal').style.display = 'none';
        const detailModalElem = document.getElementById('detailModal');
        if (detailModalElem && detailModalElem.style.display === 'flex') await openDetailModal(reactivatingItemId);
        await refreshData();
      } finally { loader.classList.remove('active'); }
    }

    async function uploadManualPDF(itemId, category, monthName) {
      return new Promise((resolve, reject) => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.pdf';
        input.onchange = async (ev) => {
          const file = ev.target.files[0];
          if (file && file.type === 'application/pdf') {
            const loader = document.getElementById('fullscreenLoader');
            loader.classList.add('active');
            try {
              const inspecaoData = new Date().toISOString().split('T')[0];
              await addFileToItem(itemId, category, file, inspecaoData);
              await refreshData();
              await openDetailModal(itemId);
              resolve();
            } catch (err) { alert('Erro ao adicionar PDF: ' + err.message); reject(err);
            } finally { loader.classList.remove('active'); }
          } else if (file) { alert('Selecione um PDF.'); reject(); }
        };
        input.click();
      });
    }

    // ==================== FORMULÁRIO ====================
    const formModal = document.getElementById('formModal');
    const formFieldsContainer = document.getElementById('formFieldsContainer');
    const closeFormModalBtn = document.getElementById('closeFormModalBtn');
    const cancelFormBtn = document.getElementById('cancelFormBtn');
    const generatePdfBtn = document.getElementById('generatePdfBtn');
    const fotoInput = document.getElementById('fotoInspecao');
    const fotoPreview = document.getElementById('fotoPreview');

    if (fotoInput) fotoInput.addEventListener('change', function(e) { const file = e.target.files[0]; if (file) { const reader = new FileReader(); reader.onload = function(event) { fotoPreview.innerHTML = `<img src="${event.target.result}" class="image-preview" alt="Preview">`; }; reader.readAsDataURL(file); } else { fotoPreview.innerHTML = ''; } });

    function openFormModal(itemId, category, monthName) {
      currentFormItemId = itemId; currentFormCategory = category; currentFormMonthName = monthName;
      const itemAtual = currentItems.find(i => String(i.id) === String(itemId));
      currentItemInfo = itemAtual || { name: '', code: '', tamanho: '' };
      document.getElementById('formModalTitle').innerText = `Formulário de Inspeção - ${monthName}`;
      let html = `<div class="form-row"><div class="form-group"><label>Unidade</label><input type="text" id="unidade" placeholder="Ex: Matriz" spellcheck="false"></div><div class="form-group"><label>Nome da Localidade</label><input type="text" id="localidade" spellcheck="false"></div></div><div class="form-row"><div class="form-group"><label>Responsável - Nome</label><input type="text" id="resp_nome" spellcheck="false"></div><div class="form-group"><label>Responsável - Matrícula</label><input type="text" id="resp_matricula" spellcheck="false"></div></div><div class="form-row"><div class="form-group"><label>Data da Inspeção</label><input type="date" id="data_inspecao"></div><div class="form-group"><label>Empresa</label><input type="text" id="empresa" spellcheck="false"></div></div><hr style="margin: 1rem 0;"><h3>Checklist de Inspeção</h3>`;
      for (let i=0; i<checklistPerguntas.length; i++) html += `<div class="question-group"><div class="question-text">${i+1}. ${escapeHtml(checklistPerguntas[i])}</div><div class="question-options"><label><input type="radio" name="resp_${i}" value="Conforme"> Conforme</label><label><input type="radio" name="resp_${i}" value="Não conforme"> Não conforme</label><label><input type="radio" name="resp_${i}" value="Não se aplica"> Não se aplica</label></div><div class="question-obs"><input type="text" placeholder="Observação (opcional)" id="obs_${i}" style="width:100%;" spellcheck="false"></div></div>`;
      formFieldsContainer.innerHTML = html;
      
      const unidadeInput = document.getElementById('unidade');
      if (unidadeInput) unidadeInput.value = 'SERRA NORTE';
      const localidadeInput = document.getElementById('localidade');
      if (localidadeInput) { const localizacao = itemAtual?.name || ''; const subLocal = itemAtual?.sub_localizacao || ''; const localidadeCompleta = subLocal ? `${localizacao} - ${subLocal}` : localizacao; localidadeInput.value = localidadeCompleta; }
      if (fotoInput) fotoInput.value = '';
      if (fotoPreview) fotoPreview.innerHTML = '';
      formModal.style.display = 'flex';
    }

    generatePdfBtn.addEventListener('click', async () => {
      const formData = { unidade: document.getElementById('unidade')?.value || '', localidade: document.getElementById('localidade')?.value || '', resp_nome: document.getElementById('resp_nome')?.value || '', resp_matricula: document.getElementById('resp_matricula')?.value || '', data_inspecao: document.getElementById('data_inspecao')?.value || '', empresa: document.getElementById('empresa')?.value || '' };
      for (let i=0; i<checklistPerguntas.length; i++) { const radio = document.querySelector(`input[name="resp_${i}"]:checked`); formData[`resp_${i}`] = radio ? radio.value : "Não respondido"; }
      if (!formData.data_inspecao || !formData.resp_nome) { alert("Preencha Data e Responsável."); return; }
      const fotoFile = document.getElementById('fotoInspecao')?.files[0] || null;
      if (!fotoFile) { alert("Por favor, anexe uma foto da inspeção."); return; }
      const loader = document.getElementById('fullscreenLoader');
      loader.classList.add('active');
      try { await generateAndAttachPdf(currentFormItemId, currentFormCategory, currentFormMonthName, formData, currentItemInfo, fotoFile); formModal.style.display = 'none';
      } catch(err) { alert("Erro: " + err.message);
      } finally { loader.classList.remove('active'); }
    });

    closeFormModalBtn.addEventListener('click', () => formModal.style.display = 'none');
    cancelFormBtn.addEventListener('click', () => formModal.style.display = 'none');

    // ==================== MODAL REATIVAR ====================
    const reactivateModal = document.getElementById('reactivateModal');
    const closeReactivateModalBtn = document.getElementById('closeReactivateModalBtn');
    const cancelReactivateBtn = document.getElementById('cancelReactivateBtn');
    const confirmReactivateBtn = document.getElementById('confirmReactivateBtn');
    closeReactivateModalBtn.addEventListener('click', () => reactivateModal.style.display = 'none');
    cancelReactivateBtn.addEventListener('click', () => reactivateModal.style.display = 'none');
    confirmReactivateBtn.addEventListener('click', saveReactivate);

    // ==================== MODAL CRIAR ITEM ====================
    const createModal = document.getElementById('createItemModal');
    const closeCreateBtn = document.getElementById('closeCreateModalBtn'), cancelCreateBtn = document.getElementById('cancelCreateBtn'), confirmCreateBtn = document.getElementById('confirmCreateBtn');
    const newItemName = document.getElementById('newItemName'), newSubLocalizacao = document.getElementById('newSubLocalizacao'), newTamanho = document.getElementById('newTamanho'), newItemCode = document.getElementById('newItemCode'), newMemorialFile = document.getElementById('newMemorialFile'), newMonthlyContainer = document.getElementById('newMonthlyFilesContainer'), createCodeError = document.getElementById('createCodeError');
    
    function buildNewMonthlyInputs() { 
      newMonthlyContainer.innerHTML = ''; 
      monthNames.forEach((month, idx) => { 
        const div = document.createElement('div'); 
        div.className = 'month-group'; 
        const label = document.createElement('label'); 
        label.textContent = month + ':'; 
        const input = document.createElement('input'); 
        input.type = 'file'; 
        input.accept = '.pdf'; 
        input.id = `new_month_${monthKeys[idx]}`; 
        div.appendChild(label); 
        div.appendChild(input); 
        newMonthlyContainer.appendChild(div); 
      }); 
    }
    buildNewMonthlyInputs();
    
    function openCreateModal() { 
      newItemName.value = ''; 
      newSubLocalizacao.value = ''; 
      newTamanho.value = ''; 
      newItemCode.value = ''; 
      newMemorialFile.value = ''; 
      monthKeys.forEach(key => { const inp = document.getElementById(`new_month_${key}`); if (inp) inp.value = ''; }); 
      createCodeError.innerText = ''; 
      createModal.style.display = 'flex'; 
    }
    
    closeCreateBtn.addEventListener('click', () => createModal.style.display = 'none');
    cancelCreateBtn.addEventListener('click', () => createModal.style.display = 'none');
    confirmCreateBtn.addEventListener('click', async () => { 
      const name = newItemName.value.trim(), sub_localizacao = newSubLocalizacao.value.trim(), tamanho = newTamanho.value.trim(), code = newItemCode.value.trim(); 
      if (!name || !code) { createCodeError.innerText = 'Preencha nome e código.'; return; } 
      createCodeError.innerText = ''; 
      const filesToProcess = []; 
      if (newMemorialFile.files.length > 0) filesToProcess.push({ category: 'memorial', file: newMemorialFile.files[0] }); 
      else filesToProcess.push({ category: 'memorial', file: null }); 
      for (let i=0; i<monthKeys.length; i++) { 
        const key = monthKeys[i]; 
        const inp = document.getElementById(`new_month_${key}`); 
        if (inp && inp.files.length > 0) filesToProcess.push({ category: key, file: inp.files[0] }); 
        else filesToProcess.push({ category: key, file: null }); 
      } 
      try { 
        await saveItemComplete(null, name, sub_localizacao, tamanho, code, filesToProcess); 
        createModal.style.display = 'none'; 
        refreshData(); 
      } catch(err) { 
        if (err.message.includes('código')) createCodeError.innerText = err.message; 
        else alert('Erro ao criar item: ' + err.message); 
      } 
    });

    // ==================== DOWNLOAD MENSAL ====================
    async function downloadMonthPDFs(category, monthName) {
      try {
        if (!window.PDFLib) throw new Error("PDF-lib não carregado.");
        const { PDFDocument } = window.PDFLib;
        const items = await getAllItemsWithFiles();
        const filesToMerge = [];
        for (const item of items) { const file = item.files.find(f => f.category === category); if (file && file.file_url) { const response = await fetch(file.file_url); if (response.ok) filesToMerge.push({ name: `${item.name} - ${item.code}.pdf`, blob: await response.blob() }); } }
        if (filesToMerge.length === 0) { alert(`Nenhum PDF encontrado para ${monthName}.`); return; }
        const mergedPdf = await PDFDocument.create();
        for (const file of filesToMerge) { const pdf = await PDFDocument.load(await file.blob.arrayBuffer()); const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices()); pages.forEach(p => mergedPdf.addPage(p)); }
        const mergedPdfBytes = await mergedPdf.save();
        const blob = new Blob([mergedPdfBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `todos_${monthName}.pdf`; a.click(); URL.revokeObjectURL(url);
      } catch(err) { alert(`Erro: ${err.message}`); }
    }

    // ==================== EVENTOS ====================
    document.getElementById('addItemBtn').addEventListener('click', openCreateModal);
    document.getElementById('searchInput').addEventListener('input', (e) => renderCards(e.target.value));
    const monthContainer = document.getElementById('monthButtonsContainer');
    monthNames.forEach((month, idx) => { const btn = document.createElement('button'); btn.className = 'month-btn'; btn.textContent = month; btn.addEventListener('click', () => downloadMonthPDFs(monthKeys[idx], month)); monthContainer.appendChild(btn); });

    // ==================== MODAL DO USUÁRIO ====================
    const userModal = document.getElementById('userModal');
    const closeUserModalBtn = document.getElementById('closeUserModalBtn');
    const cancelUserModalBtn = document.getElementById('cancelUserModalBtn');
    const userModalPrepareBtn = document.getElementById('userModalPrepareBtn');
    const userModalSyncBtn = document.getElementById('userModalSyncBtn');
    const userModalRecoverBtn = document.getElementById('userModalRecoverBtn');
    const userModalClearCacheBtn = document.getElementById('userModalClearCacheBtn');
    const userModalLogoutBtn = document.getElementById('userModalLogoutBtn');
    const syncPendingBadge = document.getElementById('syncPendingBadge');

    userInfoDisplay.addEventListener('click', async () => {
      await updateUserModalCacheStatus();
      await listarPendentesNoModal();
      userModal.style.display = 'flex';
    });
    
    syncPendingBadge.addEventListener('click', async () => {
      await mostrarModalSincronizacao();
    });

    function closeUserModal() { userModal.style.display = 'none'; }
    closeUserModalBtn.addEventListener('click', closeUserModal);
    cancelUserModalBtn.addEventListener('click', closeUserModal);
    userModal.addEventListener('click', (e) => { if (e.target === userModal) closeUserModal(); });

    userModalPrepareBtn.addEventListener('click', async () => {
      closeUserModal();
      await forcarCacheModeloPDF();
    });

    userModalSyncBtn.addEventListener('click', async () => {
      closeUserModal();
      await mostrarModalSincronizacao();
    });

    userModalRecoverBtn.addEventListener('click', async () => {
      closeUserModal();
      await forcarRecuperacaoCache();
    });

    userModalClearCacheBtn.addEventListener('click', () => {
      closeUserModal();
      limparCacheOfflineManual();
    });

    userModalLogoutBtn.addEventListener('click', () => {
      localStorage.removeItem('tendex_current_user');
      window.location.href = 'index.html';
    });

    const closeSyncModalBtn = document.getElementById('closeSyncModalBtn');
    const cancelSyncModalBtn = document.getElementById('cancelSyncModalBtn');
    const syncModal = document.getElementById('syncModal');
    
    if (closeSyncModalBtn) closeSyncModalBtn.addEventListener('click', () => syncModal.style.display = 'none');
    if (cancelSyncModalBtn) cancelSyncModalBtn.addEventListener('click', () => syncModal.style.display = 'none');
    if (syncModal) syncModal.addEventListener('click', (e) => { if (e.target === syncModal) syncModal.style.display = 'none'; });

    // ==================== INICIALIZAÇÃO ====================
    let inicializacaoCompleta = false;
    
    window.addEventListener('DOMContentLoaded', async () => {
      console.log('🚀 Inicializando TENDEX...');
      
      await initOfflineDB();
      await verificarPersistenciaDados();
      await refreshData();
      
      const modeloCacheado = await isModeloCacheado();
      if (!modeloCacheado && navigator.onLine) {
        console.log('📥 Preparando cache offline...');
        await prepararCacheOffline();
      }
      
      if (navigator.onLine) {
        console.log('🌐 Sistema online - executando rotina completa...');
        await rotinaCompletaOnline();
      } else {
        console.log('📡 Modo offline - dados carregados do cache local');
        showSyncStatus('📡 Modo offline - dados do cache local', false);
      }
      
      inicializacaoCompleta = true;
      console.log('✅ Inicialização concluída!');
      
      setInterval(async () => {
        if (navigator.onLine && inicializacaoCompleta) {
          const pendentesItems = await getPendingItems();
          const pendentesInsp = await getPendingInspections();
          if (pendentesItems.length > 0 || pendentesInsp.length > 0) {
            await rotinaCompletaOnline();
          }
        }
      }, 30000);
    });
    
    let rotinaAgendada = false;
    window.addEventListener('online', async () => {
      if (!inicializacaoCompleta) return;
      
      console.log('🌐 CONEXÃO DETECTADA! Executando rotina completa...');
      showSyncStatus('🔄 Conectado! Sincronizando e preparando offline...');
      await new Promise(resolve => setTimeout(resolve, 2000));
      
      if (!rotinaAgendada) { 
        rotinaAgendada = true; 
        await rotinaCompletaOnline();
        rotinaAgendada = false; 
      }
    });
    
    window.addEventListener('beforeunload', async () => {
      console.log('💾 Salvando dados antes de fechar...');
      await refreshData();
    });
  })();
</script>
